services:
  postgres:
    image: postgres:17.10-alpine       
    container_name: llmgw_postgres
    environment:
      POSTGRES_USER: postgres          
      POSTGRES_PASSWORD: postgres     
      POSTGRES_DB: llm_gateway         
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d llm_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.6.3-alpine          
    container_name: llmgw_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  redisdata:
